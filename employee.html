<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Módulo Empleado - Control de Asistencia</title>
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    #reader {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }

    #reader video {
      border-radius: 12px;
    }

    #qr-result,
    #resultado {
      margin-top: 12px;
      min-height: 22px;
    }

    #justificationModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #justificationModal .box {
      background: #fff;
      max-width: 500px;
      width: 100%;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    #justificationText {
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
    }

    #debugPanel {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #444;
      border-radius: 10px;
      background: #111;
      color: #ddd;
    }

    #debugOutput {
      max-height: 220px;
      overflow: auto;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="section">
    <h2>Módulo Empleado</h2>
    <p>Escanea el QR para registrar tu asistencia.</p>

    <div id="reader"></div>

    <div id="qr-result"></div>
    <div id="resultado"></div>

    <button id="logout-button" type="button">Cerrar Sesión</button>
  </div>

  <div id="justificationModal">
    <div class="box">
      <h3>Justificación de llegada tarde</h3>
      <textarea id="justificationText" rows="4" placeholder="Ingresa la razón de tu retraso"></textarea>
      <br /><br />
      <button id="saveJustificationButton" type="button">Guardar</button>
    </div>
  </div>

  <div style="margin-top:12px;">
    <select id="jornadasSelect" style="display:none; min-width:220px;"></select>
    <button id="btnConfirmarJornada" style="display:none;" type="button">Confirmar Jornada</button>
  </div>

  <div id="debugPanel">
    <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
      <strong style="flex:1;">Depuración</strong>
      <button id="debugToggleBtn" type="button">Ocultar</button>
      <button id="debugClearBtn" type="button">Limpiar</button>
    </div>
    <div id="debugOutput"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.2.0/bcrypt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-cookie/3.0.5/js.cookie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/services/session.service.js"></script>
  <script type="module" src="js/controllers/employee.controller.js"></script>
</body>
</html>
