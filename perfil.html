<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/datatables.net-dt@1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
</head>

<body>
    <nav>
        <div id="navbar-links">
            <ul id="menu">
                <li><a href="empleados.html">Empleados</a></li>
                <li><a href="asistencias.html">Asistencias</a></li>
                <li><a href="jornadas.html">Jornadas</a></li>
                <li><a href="perfil.html">Ver Mi Perfil</a></li>
                <li><a href="planilla.html">Planilla Semanal</a></li>
                <li>
                    <button id="btnDescargarQr" type="button">Generar QR Empresa</button>
                    <div id="qr-container" style="margin-top:10px;"></div>
                </li>
                <li><button id="logout-button" type="button">Cerrar Sesión</button></li>
            </ul>
        </div>
        <button id="menu-toggle" class="hamburger" type="button">&#9776;</button>
    </nav>

    <div id="perfil-container" class="form-container">
        <h2>Editar Perfil</h2>
        <form id="perfil-form">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$" required>

            <label for="identificacionNombre">Tipo de Documento</label>
            <input type="text" id="identificacionNombre" required>

            <label for="identificacion">Identificación</label>
            <input type="text" id="identificacion" name="identificacion" required>

            <label for="nacimiento">Fecha de Nacimiento</label>
            <input type="date" id="nacimiento" name="nacimiento" required>

            <label for="empleado-salariop">Salario por Hora</label>
            <input type="number" id="empleado-salariop" name="salario" step="0.01" min="0" required>

            <label for="descripcionp">Descripción</label>
            <textarea id="descripcionp" name="descripcionp"></textarea>

            <label>
                <input type="checkbox" id="cambiar-contrasena"> Cambiar Contraseña
            </label>

            <div id="nueva-contrasena-container" style="display:none;">
                <label for="nueva-contrasena">Nueva Contraseña</label>
                <input type="password" id="nueva-contrasena" autocomplete="new-password">
            </div>

            <div style="display:flex;justify-content:space-around;">
                <button type="submit" style="background-color:green;width:50%;">Guardar Cambios</button>
                <button type="button" id="btn-cancelar-perfil" style="background-color:red;width:50%;">Cancelar</button>
            </div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.2.0/bcrypt.min.js"></script>

    <script src="js/firebase-config.js"></script>
    <script type="module" src="js/services/session.service.js"></script>
    <script type="module" src="js/services/password.service.js"></script>

    <script type="module" src="js/models/perfil.model.js"></script>
    <script type="module" src="js/controllers/admin.perfil.controller.js"></script>
</body>

</html>
