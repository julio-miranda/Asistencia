<!-- FORMULARIO EMPLEADO -->
<div id="empleado-container" class="form-container" style="display:none;">
    <h2 id="titulo-form-empleado">Agregar Empleado</h2>

    <form id="empleado-form">

        <label>Nombre</label>
        <input type="text" id="empleado-nombre" required>

        <label>Email</label>
        <input type="email" id="empleado-email" required>

        <label>Tipo de Documento</label>
        <select id="empleado-identificacionNombre" required>
            <option value="" disabled selected>Seleccione una opción</option>
            <option value="dui">DUI</option>
            <option value="pasaporte">Pasaporte</option>
        </select>

        <label>Identificación</label>
        <input type="text" id="empleado-identificacion" required>

        <label>ISSS</label>
        <input type="text" id="empleado-isss">

        <label>AFP</label>
        <input type="text" id="empleado-afp">

        <label>Salario por Hora</label>
        <input type="number" id="empleado-salario" step="0.01" required>

        <label>Fecha de Nacimiento</label>
        <input type="date" id="empleado-nacimiento" required>

        <label>Descripción</label>
        <textarea id="descripcion"></textarea>

        <label>Jornadas</label>
        <select id="empleado-jornada" multiple size="4" required></select>

        <div id="seccion-contraseña">
            <input type="password" id="register-password" placeholder="Contraseña">
            <input type="password" id="register-password2" placeholder="Confirmar Contraseña">
        </div>

        <div id="cambiar-contrasena-empleado-container" style="display:none;">
            <label>
                <input type="checkbox" id="cambiar-contrasena-empleado">
                Cambiar Contraseña
            </label>

            <div id="nueva-contrasena-empleado-container" style="display:none;">
                <input type="password" id="nueva-contrasena-empleado">
            </div>
        </div>

        <button type="submit">Guardar Empleado</button>
        <button type="button" id="btn-cancelar-empleado">Cancelar</button>

    </form>
</div>

<!-- TABLA -->
<div id="tabla-empleados" class="tabla-container">
    <h2>Gestión de Empleados</h2>

    <button id="btn-agregar-empleado" type="button">Agregar Empleado</button>

    <table id="empleadosTable" class="display nowrap" style="width:100%">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Tipo Documento</th>
            <th>Identidad</th>
            <th>Nacimiento</th>
            <th>Email</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
