<body>
    <nav>
        <div id="navbar-links">
            <ul id="menu">

                    <button id="btnDescargarQr" type="button">Generar QR Empresa</button>
                    <div id="qr-container" style="margin-top:10px;"></div>

            </ul>
        </div>
        <button id="menu-toggle" class="hamburger" type="button">&#9776;</button>
    </nav>


    <div id="jornadas-container" class="form-container">
        <h2>Gestión de Jornadas</h2>

        <form id="jornada-form">
            <label for="jornada-nombre">Nombre de la Jornada</label>
            <input type="text" id="jornada-nombre" required>

            <label for="jornada-hora-entrada">Hora de Entrada</label>
            <input type="time" id="jornada-hora-entrada" required>

            <label for="jornada-hora-salida">Hora de Salida</label>
            <input type="time" id="jornada-hora-salida" required>

            <button type="submit">Guardar Jornada</button>
        </form>

        <hr>

        <table id="jornadasTable" class="display nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Hora Entrada</th>
                    <th>Hora Salida</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.6/js/jquery.dataTables.min.js"></script>

    <script src="js/firebase-config.js"></script>

    <script type="module" src="js/controllers/admin.asistencias_jornadas.controller.js"></script>
