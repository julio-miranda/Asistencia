<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Restablecer contraseña</title>

  <link rel="stylesheet" href="css/styles.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script src="js/firebase-config.js"></script>
</head>

<body>
  <div class="section">
    <h2>Restablecer contraseña</h2>

    <p id="status-msg">Verificando enlace...</p>

    <form id="reset-form" style="display:none;">
      <input type="password" id="new-password" placeholder="Nueva contraseña" required>
      <input type="password" id="confirm-password" placeholder="Confirmar contraseña" required>

      <button type="submit">
        Cambiar contraseña
      </button>
    </form>

    <button id="btn-back" type="button">
      Volver al login
    </button>
  </div>

  <script type="module" src="js/controllers/reset-password.controller.js"></script>
</body>
</html>
