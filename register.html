<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro - Control de Asistencia</title>
  <link rel="stylesheet" href="css/styles.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.2.0/bcrypt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-cookie/3.0.5/js.cookie.min.js"></script>

  <script src="js/firebase-config.js"></script>
</head>

<body>

  <div class="section">

    <h2>Registro</h2>

    <form id="register-form" action="#" method="post">

      <input id="register-nombre"
             name="nombre"
             type="text"
             placeholder="Nombre"
             required>

      <label for="register-identificacionNombre">
        Tipo de Documento
      </label>

      <select id="register-identificacionNombre"
              name="tipo_documento"
              required>

        <option value="">
          Selecciona tipo de documento
        </option>

        <option value="DUI">
          DUI
        </option>

        <option value="Pasaporte">
          Pasaporte
        </option>

      </select>

      <input id="register-numero"
             name="numero_identidad"
             type="text"
             placeholder="Número de Identidad"
             required>

      <label for="register-Fecha">
        Fecha de Nacimiento
      </label>

      <input id="register-Fecha"
             name="fecha_nacimiento"
             type="date"
             required>

      <input id="register-isss"
             name="isss"
             type="text"
             placeholder="Número ISSS">

      <input id="register-afp"
             name="afp"
             type="text"
             placeholder="Número AFP">

      <div id="empresa-select-container">
        <label for="register-empresa-select">
          Empresa
        </label>

        <select id="register-empresa-select"
                name="empresa"
                required>

          <option value="" selected>
            Selecciona una empresa
          </option>

          <option value="otro">
            Otro
          </option>

        </select>
      </div>

      <div id="manual-empresa-container"
           style="display: none;">

        <input id="register-empresa-manual"
               name="empresa_manual"
               type="text"
               placeholder="Nombre de la Empresa">

      </div>

      <div id="sucursal-select-container">
        <label for="register-sucursal-select">
          Sucursal
        </label>

        <select id="register-sucursal-select"
                name="sucursal"
                required>

          <option value="" selected>
            Selecciona una sucursal
          </option>

          <option value="otro">
            Otro
          </option>

        </select>
      </div>

      <div id="manual-sucursal-container"
           style="display: none;">

        <input id="register-sucursal-manual"
               name="sucursal_manual"
               type="number"
               placeholder="Número de Sucursal">

      </div>

      <input id="register-direccion"
             name="direccion"
             type="text"
             placeholder="Dirección Personal"
             required>

      <input id="register-telefono"
             name="telefono"
             type="tel"
             placeholder="Teléfono Personal"
             required>

      <input id="register-email"
             name="email"
             type="email"
             placeholder="Correo Electrónico"
             pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
             required>

      <input id="register-password"
             name="password"
             type="password"
             placeholder="Contraseña"
             required>

      <input id="register-password2"
             name="password2"
             type="password"
             placeholder="Confirmar Contraseña"
             required>

      <button type="submit">
        Registrarse
      </button>

    </form>

    <p>
      ¿Ya tienes cuenta?
      <a href="index.html">
        Inicia Sesión
      </a>
    </p>

  </div>

  <script type="module" src="js/controllers/register.controller.js"></script>

</body>
</html>
