<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestión de Bloqueos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/bloqueo.css">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>

<body data-page="blocker">
  <header class="topbar">
    <h1>Gestión de Bloqueos</h1>
    <button id="logout-button" class="btn-logout" type="button">
      <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
    </button>
  </header>

  <main class="container">
    <div class="card">
      <h2><i class="fas fa-user-lock"></i> Usuarios</h2>
      <table id="usuariosTable" class="display table-striped table-hover">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Email</th>
            <th>Empresa</th>
            <th>Sucursal</th>
            <th>Rol</th>
            <th>Bloqueado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2><i class="fas fa-building"></i> Empresas</h2>
      <table id="empresasTable" class="display table-striped table-hover">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Sucursal</th>
            <th>Bloqueado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/controllers/blocker.controller.js"></script>
</body>
</html>
